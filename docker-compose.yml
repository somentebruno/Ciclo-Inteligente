services:
  # PHP-FPM + Laravel (application container)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: ciclo-inteligente/app
    container_name: ciclo_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      # Composer extracts many small files; disable the process timeout so slow
      # I/O never aborts an install.
      COMPOSER_PROCESS_TIMEOUT: "0"
    volumes:
      - ./:/var/www/html:cached
      # Keep vendor/ on a Linux-native named volume (not the Windows bind mount)
      # for speed and to avoid rename/delete failures under WSL2.
      - vendor:/var/www/html/vendor
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ciclo

  # Nginx (web server)
  web:
    image: nginx:1.27-alpine
    container_name: ciclo_web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ciclo

  # PostgreSQL (relational database)
  db:
    image: postgres:16-alpine
    container_name: ciclo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ciclo_inteligente}
      POSTGRES_USER: ${DB_USERNAME:-ciclo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ciclo} -d ${DB_DATABASE:-ciclo_inteligente}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ciclo

  # Node / Vite (frontend dev server + asset build)
  node:
    image: node:20-alpine
    container_name: ciclo_node
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html:cached
      # node_modules on a Linux-native named volume (same reason as vendor).
      - node_modules:/var/www/html/node_modules
    networks:
      - ciclo

networks:
  ciclo:
    driver: bridge

volumes:
  dbdata:
    driver: local
  vendor:
    driver: local
  node_modules:
    driver: local
